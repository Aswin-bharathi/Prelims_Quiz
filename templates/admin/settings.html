{% extends 'admin/base.html' %}
{% block title %}Settings{% endblock %}
{% block page_title %}Settings{% endblock %}
{% block content %}
<div class="max-w-2xl bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-6 lg:p-8">
    <form method="POST" class="space-y-5">
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Application Name</label>
            <input type="text" name="app_name" value="{{ settings.get('app_name', 'Intercollege Quiz Platform') }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Tab Switch Limit (auto-submit)</label>
            <input type="number" name="tab_switch_limit" min="0" max="10" value="{{ settings.get('tab_switch_limit', '1') }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <div>
            <label class="flex items-center gap-2 text-slate-700 dark:text-slate-300">
                <input type="checkbox" name="prevent_copy" value="1" {% if settings.get('prevent_copy', '1') == '1' %}checked{% endif %} class="rounded border-slate-300 dark:border-slate-700 dark:bg-slate-800">
                <span class="text-sm font-semibold">Prevent copy/paste during quiz</span>
            </label>
        </div>
        <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-xl transition">Save Settings</button>
    </form>
</div>
{% endblock %}

{% extends 'admin/base.html' %}
{% block title %}Upload Questions{% endblock %}
{% block page_title %}Upload Questions{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-6 lg:p-8">
        <div class="mb-6 p-4 rounded-xl bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-900/30">
            <p class="text-sm text-blue-800 dark:text-blue-300"><strong>Required columns:</strong> question, option1, option2, option3, option4, answer</p>
            <p class="text-xs text-blue-600 dark:text-blue-400 mt-1">Supported formats: .xlsx, .xls, .csv</p>
        </div>
        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Select Quiz Type *</label>
                <select name="quiz_type_id" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                    <option value="" class="dark:bg-slate-800">-- Choose Quiz Type --</option>
                    {% for qt in quiz_types %}
                    <option value="{{ qt.id }}" class="dark:bg-slate-800">{{ qt.name }} ({{ qt.question_count }} questions)</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Upload File *</label>
                <input type="file" name="file" required accept=".xlsx,.xls,.csv"
                       class="w-full px-4 py-2.5 rounded-xl border border-dashed border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-350 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-brand-50 dark:file:bg-brand-950/40 file:text-brand-700 dark:file:text-brand-400 file:font-semibold">
            </div>
            <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-xl transition">Upload Questions</button>
        </form>
    </div>
</div>
{% endblock %}

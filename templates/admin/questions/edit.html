{% extends 'admin/base.html' %}
{% block title %}Edit Question{% endblock %}
{% block page_title %}Edit Question{% endblock %}
{% block content %}
<div class="max-w-2xl bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-6">
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Quiz Type *</label>
            <select name="quiz_type_id" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                {% for qt in quiz_types %}
                <option value="{{ qt.id }}" {% if qt.id == question.quiz_type_id %}selected{% endif %} class="dark:bg-slate-800">{{ qt.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Question *</label>
            <textarea name="question" required rows="3" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">{{ question.question }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Option 1 *</label>
            <input type="text" name="option1" required value="{{ question.option1 }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Option 2 *</label>
            <input type="text" name="option2" required value="{{ question.option2 }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Option 3 *</label>
            <input type="text" name="option3" required value="{{ question.option3 }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Option 4 *</label>
            <input type="text" name="option4" required value="{{ question.option4 }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Correct Answer *</label>
            <input type="text" name="answer" required value="{{ question.answer }}" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-xl transition">Update Question</button>
            <a href="{{ url_for('admin.show_questions', quiz_type_id=question.quiz_type_id) }}" class="px-6 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 dark:text-slate-200 transition">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

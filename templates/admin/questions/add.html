{% extends 'admin/base.html' %}
{% block title %}Add Question{% endblock %}
{% block page_title %}Add Question{% endblock %}
{% block content %}
<div class="max-w-2xl bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-6">
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Quiz Type *</label>
            <select name="quiz_type_id" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                {% for qt in quiz_types %}<option value="{{ qt.id }}" class="dark:bg-slate-800">{{ qt.name }}</option>{% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Question *</label>
            <textarea name="question" required rows="3" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none"></textarea>
        </div>
        {% for i in range(1,5) %}
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Option {{ i }} *</label>
            <input type="text" name="option{{ i }}" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        {% endfor %}
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Correct Answer *</label>
            <input type="text" name="answer" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-xl transition">Add Question</button>
    </form>
</div>
{% endblock %}

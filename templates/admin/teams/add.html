{% extends 'admin/base.html' %}
{% block title %}Add Team{% endblock %}
{% block page_title %}Add Team{% endblock %}
{% block content %}
<div class="max-w-lg bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-6">
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-semibold mb-1.5 text-slate-700 dark:text-slate-300">Team Name *</label>
            <input type="text" name="lotname" required class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold mb-3 text-slate-700 dark:text-slate-300">Assignment</label>
            <label class="flex items-center gap-2 mb-2 text-slate-700 dark:text-slate-300 text-sm"><input type="radio" name="assignment" value="all" class="text-brand-600 dark:bg-slate-800 dark:border-slate-700 focus:ring-brand-500"> All Quiz Types</label>
            <label class="flex items-center gap-2 text-slate-700 dark:text-slate-300 text-sm"><input type="radio" name="assignment" value="specific" checked class="text-brand-600 dark:bg-slate-800 dark:border-slate-700 focus:ring-brand-500"> Specific Quiz Types</label>
            <div class="mt-3 space-y-2 pl-6">
                {% for qt in quiz_types %}
                <label class="flex items-center gap-2 text-sm text-slate-700 dark:text-slate-300"><input type="checkbox" name="quiz_type_ids" value="{{ qt.id }}" class="rounded dark:bg-slate-800 dark:border-slate-700 text-brand-600 focus:ring-brand-500"> {{ qt.name }}</label>
                {% endfor %}
            </div>
        </div>
        <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-xl transition">Add Team</button>
    </form>
</div>
{% endblock %}

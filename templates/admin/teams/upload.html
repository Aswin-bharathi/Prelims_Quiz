{% extends 'admin/base.html' %}
{% block title %}Upload Teams{% endblock %}
{% block page_title %}Upload Teams{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-6 lg:p-8">
        <div class="mb-6 p-4 rounded-xl bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-900/30">
            <p class="text-sm text-emerald-800 dark:text-emerald-300"><strong>Required column:</strong> lotname (or team_name)</p>
            <p class="text-xs text-emerald-600 dark:text-emerald-400 mt-1">Duplicate teams will be skipped with error reporting.</p>
        </div>
        <form method="POST" enctype="multipart/form-data" class="space-y-5" id="upload-form">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">Quiz Assignment *</label>
                <div class="space-y-3">
                    <label class="flex items-start gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:border-brand-300 dark:hover:border-brand-600 transition has-[:checked]:border-brand-500 dark:has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50/50 dark:has-[:checked]:bg-brand-950/20">
                        <input type="radio" name="assignment" value="specific" checked class="mt-1 text-brand-600 dark:bg-slate-800 dark:border-slate-700 focus:ring-brand-500" onchange="toggleAssignment()">
                        <div>
                            <p class="font-semibold text-sm text-slate-800 dark:text-slate-200">Option A — Specific Quiz Type</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Assign all uploaded teams to one quiz type only.</p>
                        </div>
                    </label>
                    <label class="flex items-start gap-3 p-4 rounded-xl border border-slate-200 dark:border-slate-800 cursor-pointer hover:border-brand-300 dark:hover:border-brand-600 transition has-[:checked]:border-brand-500 dark:has-[:checked]:border-brand-500 has-[:checked]:bg-brand-50/50 dark:has-[:checked]:bg-brand-950/20">
                        <input type="radio" name="assignment" value="all" class="mt-1 text-brand-600 dark:bg-slate-800 dark:border-slate-700 focus:ring-brand-500" onchange="toggleAssignment()">
                        <div>
                            <p class="font-semibold text-sm text-slate-800 dark:text-slate-200">Option B — All Quiz Types</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Teams eligible for every active quiz.</p>
                        </div>
                    </label>
                </div>
            </div>
            <div id="quiz-type-select">
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Quiz Type</label>
                <select name="quiz_type_id" class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                    {% for qt in quiz_types %}
                    <option value="{{ qt.id }}" class="dark:bg-slate-800">{{ qt.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Upload Excel/CSV *</label>
                <input type="file" name="file" required accept=".xlsx,.xls,.csv"
                       class="w-full px-4 py-2.5 rounded-xl border border-dashed border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-350 text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-emerald-50 dark:file:bg-emerald-950/40 file:text-emerald-700 dark:file:text-emerald-400 file:font-semibold">
            </div>
            <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-xl transition">Upload Teams</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function toggleAssignment() {
    const isAll = document.querySelector('input[name="assignment"][value="all"]').checked;
    document.getElementById('quiz-type-select').style.display = isAll ? 'none' : 'block';
}
</script>
{% endblock %}

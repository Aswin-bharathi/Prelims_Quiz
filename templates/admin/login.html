{% extends 'admin/base.html' %}
{% block title %}Login{% endblock %}
{% block page_title %}Admin Login{% endblock %}

{% block login_content %}
<div class="w-full max-w-md">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-brand-600 text-white flex items-center justify-center text-2xl font-bold mx-auto mb-4">Q</div>
            <h3 class="text-2xl font-bold text-slate-800 dark:text-white">Admin Login</h3>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Sign in to manage quizzes</p>
        </div>
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Username</label>
                <input type="text" name="username" required autocomplete="username"
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Password</label>
                <input type="password" name="password" required autocomplete="current-password"
                       class="w-full px-4 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 px-4 rounded-xl transition shadow-lg shadow-brand-600/25">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'quiz/base.html' %}
{% block title %}Results{% endblock %}
{% block body %}
<div class="quiz-result-scene">
    <div id="bubble-container" class="quiz-bubbles"></div>
    <div class="quiz-result-card quiz-fade-in">
        <div class="quiz-result-icon">🏆</div>
        <h1 class="quiz-title">Congratulations!</h1>
        <p class="quiz-subtitle">{{ result.lotname }}</p>
        <p class="quiz-score-label">{{ result.quiz_type_name }}</p>
        <p style="color:var(--quiz-muted);margin-top:1rem;font-size:0.9rem;">
            Results will be announced by the organizers. Thank you for participating!
        </p>
    </div>
</div>
{% endblock %}
